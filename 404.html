<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Not Found | Genius Gems & Jewellery</title>
    <meta name="description" content="The page or jewelry design you are looking for could not be found. Return to Genius Gems & Jewellery home or browse our collections.">
    
    <!-- Google Fonts & FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Sticky Navigation Header -->
    <header id="global-header"></header>

    <!-- Page Banner -->
    <section class="page-banner" style="background-image: url('assets/images/hero1.png');">
        <div class="page-banner-content">
            <h1>404 Error</h1>
            <div class="breadcrumbs">
                <a href="index.html">Home</a> &nbsp;/&nbsp; <span>Page Not Found</span>
            </div>
        </div>
    </section>

    <!-- 404 Main Section -->
    <section class="section" style="text-align: center; min-height: 50vh; display: flex; align-items: center; justify-content: center;">
        <div class="container">
            <div class="no-results" style="padding: 0;">
                <i class="fas fa-gem" style="font-size: 4rem; color: var(--gold); margin-bottom: 20px; animation: pulse 2s infinite;"></i>
                <h2 style="font-size: 2.5rem; margin-bottom: 15px;">Design Not Found</h2>
                <p style="max-width: 600px; margin: 0 auto 30px;">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let us guide you back to our luxurious collections.</p>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <a href="index.html" class="btn btn-primary">Return Home</a>
                    <a href="shop.html" class="btn btn-outline">Explore Shop</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Global Footer -->
    <footer id="global-footer"></footer>

    <!-- Scripts -->
    <script src="assets/js/products.js"></script>
    <script src="assets/js/main.js"></script>
    
    <style>
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</body>
</html>
